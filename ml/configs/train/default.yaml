task: multiclass
model_type: mlp_classifier
seed: 42
device: auto
tensorboard_dir: ml/tensorboard
artifact_dir: ml/models/weights
log_every_n_steps: 20

classification:
  batch_size: 128
  epochs: 12
  learning_rate: 0.001
  hidden_dim: 128
  dropout: 0.1

logistic_regression:
  max_iter: 2000
  c: 1.0
  class_weight: balanced

xgboost:
  n_estimators: 300
  max_depth: 5
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  reg_lambda: 1.0
  n_jobs: 2

autoencoder:
  batch_size: 128
  epochs: 30
  learning_rate: 0.001
  hidden_dim: 48
  latent_dim: 12
  threshold_percentile: 95.0
