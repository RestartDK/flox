dataset_name: synthetic_actuator_anomaly_dataset
output_dir: ml/data/processed
real_data_path: ml/data/anomaly_dataset.csv
synthetic_csv_name: synthetic_anomaly_dataset.csv
realism_report_name: realism_report.json
metadata_name: metadata.json
seed: 42

simulation:
  runs_per_class: 240
  min_steps: 192
  max_steps: 320
  timestep_ms_min: 40.0
  timestep_ms_max: 60.0
  severity_min: 0.2
  severity_max: 1.0

splits:
  train: 0.7
  val: 0.15
  test: 0.15

windows:
  size: 64
  stride: 16

calibration:
  enabled: true
  latent_dim: 3
  knn_k: 5
  max_report_samples: 1000
